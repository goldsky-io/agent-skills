# Minimal ERC-20 Transfers Pipeline (Blackhole Sink)
# Use this template for quick testing - no credentials needed
#
# Usage:
#   1. Copy this file to your project
#   2. Change 'name' to something unique
#   3. Optionally change dataset_name to a different chain (ethereum, matic, arbitrum, etc.)
#   4. Run: goldsky turbo apply <filename>.yaml -i

name: my-erc20-pipeline
resource_size: s

sources:
  transfers:
    type: dataset
    dataset_name: base.erc20_transfers
    version: 1.2.0
    start_at: latest # Change to 'earliest' to process historical data

transforms: {}

sinks:
  output:
    type: blackhole
    from: transfers
