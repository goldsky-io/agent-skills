# Solana Token Transfers Pipeline
# Processes SPL token transfers on Solana
#
# Note: Solana uses slot numbers instead of 'start_at' for positioning.
# Omit 'start_block' to start from the latest slot.
#
# Usage:
#   1. Copy this file to your project
#   2. Change 'name' to something unique
#   3. Optionally add 'start_block' to start from a specific slot
#   4. Run: goldsky turbo apply <filename>.yaml -i

name: solana-transfers
resource_size: s

sources:
  sol_transfers:
    type: dataset
    dataset_name: solana.token_transfers
    version: 1.0.0
    # Solana positioning options:
    # - Omit start_block to start from latest
    # - Add 'start_block: 250000000' to start from a specific slot

transforms: {}

sinks:
  output:
    type: blackhole
    from: sol_transfers
