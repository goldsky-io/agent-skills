# PostgreSQL Output Pipeline
# Writes ERC-20 transfers to a PostgreSQL database
#
# Prerequisites:
#   1. Create a secret with your PostgreSQL credentials:
#      goldsky secret create --name MY_POSTGRES_SECRET --value '{"type":"jdbc","protocol":"postgres","host":"your-host.com","port":5432,"databaseName":"mydb","user":"admin","password":"secret"}'
#
# Usage:
#   1. Copy this file to your project
#   2. Change 'name' to something unique
#   3. Update 'secret_name' to match your created secret
#   4. Optionally change schema/table names
#   5. Run: goldsky turbo apply <filename>.yaml
#
# Table will be created automatically if it doesn't exist

name: transfers-to-postgres
resource_size: s

sources:
  transfers:
    type: dataset
    dataset_name: base.erc20_transfers
    version: 1.2.0
    start_at: latest

transforms: {}

sinks:
  postgres_output:
    type: postgres
    from: transfers
    schema: public
    table: erc20_transfers
    secret_name: MY_POSTGRES_SECRET # Change this to your secret name
    primary_key: id
