# Multi-Chain Pipeline
# Combines ERC-20 transfers from multiple chains into a single stream
#
# Usage:
#   1. Copy this file to your project
#   2. Change 'name' to something unique
#   3. Add or remove chains as needed
#   4. Run: goldsky turbo apply <filename>.yaml -i
#
# Available chain prefixes:
#   - ethereum, base, matic, arbitrum, optimism, bsc, avalanche

name: multi-chain-transfers
resource_size: m # Use 'm' for multiple sources

sources:
  eth_transfers:
    type: dataset
    dataset_name: ethereum.erc20_transfers
    version: 1.0.0
    start_at: latest

  base_transfers:
    type: dataset
    dataset_name: base.erc20_transfers
    version: 1.2.0
    start_at: latest

  matic_transfers:
    type: dataset
    dataset_name: matic.erc20_transfers
    version: 1.0.0
    start_at: latest

transforms:
  combined:
    type: sql
    primary_key: id
    sql: |
      SELECT *, 'ethereum' as chain FROM eth_transfers
      UNION ALL
      SELECT *, 'base' as chain FROM base_transfers
      UNION ALL
      SELECT *, 'polygon' as chain FROM matic_transfers

sinks:
  output:
    type: blackhole
    from: combined
